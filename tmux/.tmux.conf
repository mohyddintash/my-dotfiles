# ===================================================================
# General TMUX Settings
# ===================================================================

# Set prefix to C-s (Ctrl+s) and unbind the default C-b
set -g prefix C-s
unbind C-b

# Reload config with PREFIX + r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Enable mouse support
set -g mouse on

# Set terminal color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:rgb"

# Use vi mode for copy mode
set-window-option -g mode-keys vi

# Bind pane navigation to h, j, k, l
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Move status bar to the top
set-option -g status-position top
# Center the window list in the status bar
##set -g status-justify centre
set -g status-left-length 30
# ===================================================================
# Plugin Options (must be set before the plugin list)
# ===================================================================

# Catppuccin theme settings
#set -g @catppuccin_flavour 'mocha'
#set -g @catppuccin_window_status_style "rounded"

# --- THE DEFINITIVE STATUS BAR FIX ---
# We are telling Catppuccin exactly which modules to show and where.
# This prevents any chance of them overlapping.

#set -g @catppuccin_status_modules_right "application date_time"
#set -g @catppuccin_status_modules_left "session"

# ===================================================================
# Plugin List
# ===================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
#set -g @plugin 'catppuccin/tmux'

# ===================================================================
# Initialize TPM (must be the last line)
# ===================================================================

run '~/.tmux/plugins/tpm/tpm'
