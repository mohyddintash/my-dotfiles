# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions: hyprctl monitors
# Format: monitor = [port], resolution@refresh, position, scale

# Laptop (LG Display, ~15") - scale 1.25 for comfortable text (logical 1536x864)
monitor=eDP-1,1920x1080@60,0x0,1.5

# Acer CB342CK 34" ultrawide - smooth 60fps, full ultrawide width (logical 2560x1080)
monitor=HDMI-A-1,2560x1080@60,auto-left,1.25
#monitor=HDMI-A-1,2560x1080@60,auto-left,1
